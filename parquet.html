<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquet 文件可视化查看器</title>
    <!-- 修复 favicon 404 报错 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loader { border: 3px solid #e2e8f0; border-radius: 50%; border-top: 3px solid #3b82f6; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">📊</span>
                <h1 class="text-lg font-bold text-slate-900 tracking-tight">Parquet Viewer</h1>
            </div>
            <div class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">Static & Client-Side</div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full space-y-6">
        
        <!-- 控制面板 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1.5">📁 本地文件</label>
                    <input type="file" id="fileInput" accept=".parquet" 
                        class="block w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer border border-slate-200 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500/50"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1.5">🌐 远程 URL (需支持 CORS)</label>
                    <div class="flex gap-2">
                        <input type="text" id="urlInput" placeholder="https://.../data.parquet" 
                            class="flex-grow w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition"/>
                        <button id="loadUrlBtn" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">加载</button>
                    </div>
                </div>
            </div>

            <div id="statusArea" class="mt-4 hidden flex items-center gap-2 text-sm text-blue-600 bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                <div class="loader"></div>
                <span id="statusText">处理中...</span>
            </div>
            <div id="errorArea" class="mt-4 hidden text-sm text-red-600 bg-red-50/50 p-3 rounded-lg border border-red-100" id="errorText"></div>
        </div>

        <!-- 数据信息 -->
        <div id="infoPanel" class="hidden flex justify-between items-center px-1">
            <div class="text-sm text-slate-600">
                预览: <span id="rowCount" class="font-semibold text-slate-900">0</span> 行 | 
                列数: <span id="colCount" class="font-semibold text-slate-900">0</span>
            </div>
            <div class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded">仅展示前 1000 行以保证流畅</div>
        </div>

        <!-- 表格容器 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden relative min-h-[250px]">
            <div class="overflow-x-auto max-h-[70vh]">
                <table class="min-w-full divide-y divide-slate-200" id="dataTable">
                    <thead class="bg-slate-50 sticky top-0 z-10">
                        <tr id="tableHeader">
                            <th class="px-5 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">请上传或加载文件</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-100" id="tableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-white/80 backdrop-blur-sm">
                <svg class="w-10 h-10 mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                <p class="text-sm font-medium">等待数据载入...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-auto py-4">
        <p class="text-center text-xs text-slate-500">Pure Client-Side Parquet Parser • No Server Required</p>
    </footer>

    <!-- 核心逻辑 (已修复重复声明问题) -->
    <script type="module">
        // 单次导入，避免重复声明错误
        import { parquetRead } from 'https://esm.sh/hyparquet@0.4.0';

        const MAX_ROWS = 1000;
        
        const fileInput = document.getElementById('fileInput');
        const urlInput = document.getElementById('urlInput');
        const loadUrlBtn = document.getElementById('loadUrlBtn');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        const errorArea = document.getElementById('errorArea');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const infoPanel = document.getElementById('infoPanel');

        // 监听本地文件
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            resetUI();
            showStatus(`读取文件: ${file.name}`);
            try {
                const buffer = await file.arrayBuffer();
                await processParquet(buffer);
            } catch (err) { showError(err.message); }
        });

        // 监听远程 URL
        loadUrlBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;
            resetUI();
            showStatus('下载远程数据...');
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const buffer = await res.arrayBuffer();
                await processParquet(buffer);
            } catch (err) { 
                showError(`加载失败: ${err.message}。请确保链接有效且服务器允许跨域(CORS)。`); 
            }
        });

        async function processParquet(buffer) {
            showStatus('解析 Parquet 二进制结构...');
            try {
                // 将回调转为 Promise 便于 await
                const data = await new Promise((resolve, reject) => {
                    parquetRead({
                        file: buffer,
                        onComplete: resolve,
                        onError: reject
                    });
                });
                renderTable(data);
            } catch (err) {
                showError('解析失败: ' + err.message);
            }
        }

        function renderTable(rawData) {
            hideStatus();
            emptyState.classList.add('hidden');
            infoPanel.classList.remove('hidden');

            // 兼容处理：hyparquet 可能返回对象数组(行式) 或 键值对对象(列式)
            let rows = Array.isArray(rawData) ? rawData : [];
            let columns = [];

            if (rows.length > 0) {
                columns = Object.keys(rows[0]);
            } else if (typeof rawData === 'object' && !Array.isArray(rawData)) {
                // 如果是列式数据: { col1: [v1,v2], col2: [v3,v4] }
                columns = Object.keys(rawData);
                const rowCount = columns.length > 0 ? rawData[columns[0]].length : 0;
                for (let i = 0; i < rowCount; i++) {
                    const row = {};
                    columns.forEach(col => row[col] = rawData[col][i]);
                    rows.push(row);
                }
            }

            if (columns.length === 0) {
                showError('文件中未找到有效列数据');
                return;
            }

            const total = rows.length;
            const displayLimit = Math.min(total, MAX_ROWS);
            
            document.getElementById('rowCount').textContent = `${displayLimit} / ${total}`;
            document.getElementById('colCount').textContent = columns.length;

            // 渲染表头
            tableHeader.innerHTML = '';
            columns.forEach(col => {
                const th = document.createElement('th');
                th.className = "px-5 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider bg-slate-50 border-b border-slate-200 whitespace-nowrap";
                th.textContent = col;
                tableHeader.appendChild(th);
            });

            // 渲染表体 (使用 DocumentFragment 提升性能)
            tableBody.innerHTML = '';
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < displayLimit; i++) {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors";
                
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.className = "px-5 py-3 text-sm text-slate-700 border-b border-slate-100 whitespace-nowrap max-w-[300px] truncate";
                    
                    const val = rows[i][col];
                    if (val === null || val === undefined) {
                        td.innerHTML = '<span class="text-slate-400 italic">null</span>';
                    } else if (typeof val === 'object') {
                        td.textContent = JSON.stringify(val);
                        td.title = JSON.stringify(val);
                        td.className += " cursor-help";
                    } else {
                        td.textContent = String(val);
                    }
                    tr.appendChild(td);
                });
                fragment.appendChild(tr);
            }
            tableBody.appendChild(fragment);
        }

        function showStatus(msg) { statusArea.classList.remove('hidden'); errorArea.classList.add('hidden'); statusText.textContent = msg; }
        function hideStatus() { statusArea.classList.add('hidden'); }
        function showError(msg) { statusArea.classList.add('hidden'); errorArea.classList.remove('hidden'); errorArea.textContent = msg; }
        function resetUI() {
            tableHeader.innerHTML = '<th class="px-5 py-3 text-left text-xs font-medium text-slate-500">加载中...</th>';
            tableBody.innerHTML = '';
            infoPanel.classList.add('hidden');
            emptyState.classList.add('hidden');
            errorArea.classList.add('hidden');
        }
    </script>
</body>
</html>
