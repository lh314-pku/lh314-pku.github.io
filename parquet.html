<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquet 文件查看器</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --highlight-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Area */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-secondary);
        }

        /* Upload Area */
        .upload-area {
            background: var(--surface-color);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            fill: var(--primary-color);
        }

        .upload-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .upload-hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        #fileInput {
            display: none;
        }

        /* Stats Bar */
        .stats-bar {
            display: none; /* Hidden initially */
            background: var(--surface-color);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--primary-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        /* Table Area */
        .table-wrapper {
            display: none; /* Hidden initially */
            margin-top: 1.5rem;
            background: var(--surface-color);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
            max-height: 600px;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 0 var(--border-color);
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--highlight-bg);
        }

        /* Utility */
        .btn {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--highlight-bg);
            border-color: #cbd5e1;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            box-shadow: var(--shadow-md);
            transform: translateY(100px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateY(0);
        }

        .badge-limit {
            background-color: #fff7ed;
            color: #c2410c;
            border: 1px solid #ffedd5;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Parquet Viewer</h1>
            <p class="subtitle">纯前端 .parquet 文件可视化工具</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-area" id="dropZone">
            <svg class="upload-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <div class="upload-text">点击上传或拖拽 Parquet 文件到此处</div>
            <div class="upload-hint">支持 .parquet 格式，数据在本地浏览器解析</div>
            <input type="file" id="fileInput" accept=".parquet">
        </div>

        <!-- Stats Section -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">文件名</span>
                    <span class="stat-value" id="fileName">-</span>
                </div>
            </div>
            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">总行数</span>
                    <span class="stat-value" id="totalRows">-</span>
                </div>
                <div class="stat-item" style="margin-left: 1.5rem;">
                    <span class="stat-label">列数</span>
                    <span class="stat-value" id="totalCols">-</span>
                </div>
            </div>
            <div class="controls">
                <button class="btn" id="resetBtn">重置</button>
            </div>
        </div>

        <!-- Table Section -->
        <div class="table-wrapper" id="tableWrapper">
            <table id="dataTable">
                <thead>
                    <tr id="tableHead"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div style="margin-top: 10px; color: var(--text-secondary); font-size: 0.85rem; display: none;" id="paginationHint">
            * 为保证浏览器流畅，仅展示前 <span id="limitCount">1000</span> 行数据。
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: var(--text-secondary);">正在解析 Parquet 文件...</p>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="errorToast">无法读取文件，请确保是有效的 Parquet 格式。</div>

    <!-- ES Module Script -->
    <script type="module">
        // 使用 hyparquet 库，这是一个轻量级的纯 JS Parquet 解析器
        import { parquetRead } from 'https://cdn.jsdelivr.net/npm/hyparquet@1.0.0/+esm';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorToast = document.getElementById('errorToast');
        const statsBar = document.getElementById('statsBar');
        const tableWrapper = document.getElementById('tableWrapper');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const paginationHint = document.getElementById('paginationHint');
        
        // 配置：最大显示行数，防止大文件卡死浏览器
        const MAX_PREVIEW_ROWS = 500; 

        // Event Listeners for Drag & Drop
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });

        // Main File Handling Logic
        async function handleFile(file) {
            // UI Reset
            resetUI();
            
            // Validate extension
            if (!file.name.endsWith('.parquet')) {
                showError("请上传 .parquet 格式的文件");
                return;
            }

            showLoading(true);
            
            try {
                // 1. Read file as ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();

                // 2. Parse Parquet using hyparquet
                // hyparquet 返回的是对象数组，非常便于处理
                const { data, rowCount } = await parquetRead({
                    file: arrayBuffer,
                    // 为了性能，我们可以只读取部分数据，但 hyparquet 默认是全读。
                    // 我们在渲染层进行截断。
                });

                // 3. Update Stats
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileName').title = file.name;
                document.getElementById('totalRows').textContent = rowCount.toLocaleString();
                
                // 4. Render Table
                renderTable(data);

                // Show UI elements
                statsBar.style.display = 'flex';
                tableWrapper.style.display = 'block';
                dropZone.style.display = 'none'; // Hide upload box to focus on data

            } catch (err) {
                console.error(err);
                showError("解析文件失败: " + err.message);
            } finally {
                showLoading(false);
            }
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                showError("文件中没有数据");
                return;
            }

            // Limit rows for preview
            const previewData = data.slice(0, MAX_PREVIEW_ROWS);
            const isLimited = data.length > MAX_PREVIEW_ROWS;

            // Get columns from the first row keys
            const columns = Object.keys(previewData[0]);
            document.getElementById('totalCols').textContent = columns.length;

            // Render Header
            tableHead.innerHTML = '';
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                tableHead.appendChild(th);
            });

            // Render Body
            tableBody.innerHTML = '';
            // 使用 DocumentFragment 优化渲染性能
            const fragment = document.createDocumentFragment();

            previewData.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    const val = row[col];
                    
                    // Handle null/undefined
                    if (val === null || val === undefined) {
                        td.textContent = 'NULL';
                        td.style.color = '#cbd5e1';
                        td.style.fontStyle = 'italic';
                    } else if (typeof val === 'object') {
                        // Handle nested objects/arrays in Parquet
                        td.textContent = JSON.stringify(val);
                        td.style.fontFamily = 'monospace';
                    } else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                fragment.appendChild(tr);
            });

            tableBody.appendChild(fragment);

            // Show pagination limit hint if needed
            if (isLimited) {
                paginationHint.style.display = 'block';
                document.getElementById('limitCount').textContent = MAX_PREVIEW_ROWS;
            }
        }

        // Utility Functions
        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add('show');
            setTimeout(() => {
                errorToast.classList.remove('show');
            }, 5000);
        }

        function resetUI() {
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            statsBar.style.display = 'none';
            tableWrapper.style.display = 'none';
            paginationHint.style.display = 'none';
            errorToast.classList.remove('show');
        }
    </script>
</body>
</html>
