<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>新闻详情 - 元火x文春部</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #fef9f0;
            color: #2c2418;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #ff7b2c;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .back-link:hover {
            color: #e65c00;
            transform: translateX(-4px);
        }
        .detail-card {
            background: white;
            border-radius: 32px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffe3c6;
        }
        .detail-tag {
            display: inline-block;
            background: #ffede3;
            color: #d95b0c;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            margin-bottom: 1rem;
        }
        .detail-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0.5rem 0 1rem;
            color: #2c1a0c;
            line-height: 1.3;
        }
        .detail-date {
            font-size: 0.9rem;
            color: #b45a2e;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed #ffd2a5;
            padding-bottom: 0.8rem;
        }
        .detail-content {
            font-size: 1.05rem;
            color: #2c2418;
        }
        .detail-content img {
            max-width: 100%;
            border-radius: 16px;
            margin: 1rem 0;
        }
        .detail-content p {
            margin-bottom: 1rem;
        }
        .detail-content h1, .detail-content h2, .detail-content h3 {
            margin: 1.5rem 0 0.75rem;
            color: #c2410c;
        }
        .detail-content ul, .detail-content ol {
            margin: 0.5rem 0 1rem 1.5rem;
        }
        .loading, .error {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #b77e4a;
        }
        @media (max-width: 600px) {
            .detail-title { font-size: 1.6rem; }
            .detail-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← 返回新闻列表</a>
    <div id="detailContainer" class="detail-card">
        <div class="loading">🔥 加载文春特报中...</div>
    </div>
    <div class="footer">
        🌸 元火动漫社 · 文春宣传部 | 内容纯属虚构 热爱依旧真实 🌸
    </div>
</div>

<script>
    // 从 URL 参数获取新闻文件名
    function getNewsFilename() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('news');
    }

    async function loadNewsDetail() {
        const filename = getNewsFilename();
        const container = document.getElementById('detailContainer');
        
        if (!filename) {
            container.innerHTML = '<div class="error">❓ 未指定新闻稿件，请返回首页重试。</div>';
            return;
        }

        try {
            const response = await fetch(`msgs/${filename}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const mdText = await response.text();
            
            // 解析元数据和正文 (与首页解析逻辑一致)
            const lines = mdText.split(/\r?\n/);
            let title = "";
            let date = "";
            let tag = "";
            let bodyLines = [];
            let metaDone = false;
            let idx = 0;
            
            // 解析标题 (# 开头)
            if (lines.length && lines[0].trim().startsWith("# ")) {
                title = lines[0].trim().replace(/^#\s+/, "").trim();
                idx = 1;
            } else {
                title = filename.replace(/\.md$/i, "");
            }
            
            // 解析元数据 (日期/标签/简介，但简介详情页可不重复显示)
            let metaParsed = false;
            for (let i = idx; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();
                if (!metaParsed && trimmed === "") continue;
                if (!date && trimmed.match(/^日期[:：]\s*/)) {
                    date = trimmed.replace(/^日期[:：]\s*/, "").trim();
                    continue;
                }
                if (!tag && trimmed.match(/^标签[:：]\s*/)) {
                    tag = trimmed.replace(/^标签[:：]\s*/, "").trim();
                    continue;
                }
                // 跳过简介行，因为正文才是重点
                if (trimmed.match(/^简介[:：]\s*/)) {
                    continue;
                }
                // 遇到非元数据行则停止元数据收集
                if ((date && tag) || (trimmed !== "" && !trimmed.match(/^(日期|标签|简介)[:：]/))) {
                    metaParsed = true;
                    bodyLines.push(line);
                } else if (!metaParsed && trimmed !== "" && !trimmed.match(/^(日期|标签|简介)[:：]/)) {
                    metaParsed = true;
                    bodyLines.push(line);
                } else if (!metaParsed) {
                    continue;
                } else {
                    bodyLines.push(line);
                }
            }
            
            if (!date) date = "元火历 · 吉日";
            if (!tag) tag = "文春部速递";
            const markdownBody = bodyLines.join("\n").trim() || "暂无更多内容，敬请期待～";
            
            // 渲染 HTML
            const renderedHtml = marked.parse(markdownBody);
            const finalHtml = `
                <div>
                    <span class="detail-tag">🏷️ ${escapeHtml(tag)}</span>
                    <div class="detail-title">${escapeHtml(title)}</div>
                    <div class="detail-date">📅 ${escapeHtml(date)}</div>
                    <div class="detail-content">${renderedHtml}</div>
                </div>
            `;
            container.innerHTML = finalHtml;
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error">😭 新闻走丢了！请检查 msgs/${filename} 是否存在。<br><br>👉 <a href="index.html">返回首页看看别的～</a></div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadNewsDetail();
</script>
</body>
</html>
