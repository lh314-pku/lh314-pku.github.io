<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · 页面不存在</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("lh314-theme");
        var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (error) {}
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="site-shell nav" aria-label="主导航">
      <a class="brand" href="/">
        <img class="avatar" src="/assets/avatar-placeholder.png" alt="LH314 avatar placeholder">
        <span class="brand-title">LH314</span>
        <span class="brand-subtitle">notes, courses, and small tools</span>
      </a>
      <p class="profile-note">个人简介占位：PKU 信科在读，记录课程笔记、项目页面和一些学习工具。</p>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="/#notes">笔记</a>
        <a href="/friends.html">资源</a>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换夜间模式" aria-pressed="false">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
        <span class="theme-toggle-text">夜间模式</span>
      </button>
    </nav>
  </header>

  <main class="site-shell not-found">
    <section>
      <p class="eyebrow">Page Not Found</p>
      <h1>404</h1>
      <p class="section-note">这个页面暂时不存在，可能是链接移动了，或者笔记还没有整理到这里。</p>
      <div class="quick-actions" style="justify-content: center;">
        <a class="button" href="/">回到首页</a>
        <a class="button secondary" href="/#notes">浏览笔记</a>
      </div>
    </section>
  </main>
  <script src="/theme.js"></script>
</body>
</html>
